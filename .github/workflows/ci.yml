name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {} # default: no token scopes; jobs opt in below

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.20.0-rc.5"
  OTP_VERSION: "29.0"
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  check:
    name: Elixir + Rust verification
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout the repository
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-check
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Shared build env
        uses: ./.github/actions/setup
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
          rust-toolchain: ${{ env.RUST_TOOLCHAIN }}
          rust-components: "rustfmt, clippy"

      - name: Install zizmor
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/zizmorcore/zizmor/releases/download/v1.25.2/zizmor-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.local/bin" zizmor
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run full check (Elixir + Rust)
        run: task check

      - name: Verify Hex tarball builds
        # Sanity-check the package metadata + files list. Does not publish.
        run: mix hex.build
