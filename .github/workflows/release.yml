name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g., v0.1.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # Pinned to match ci.yml so the artefacts we ship are produced by the
  # same toolchain CI gates against.
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      tag_exists: ${{ steps.resolve.outputs.tag_exists }}
      sha: ${{ steps.resolve.outputs.sha }}
      nif_version: ${{ steps.resolve.outputs.nif_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve release target
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          TRIGGER_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
            VERSION="${TAG#v}"
            SHOULD_RELEASE=true
          else
            VERSION="$(sed -n 's/^  @version "\([^"]*\)"$/\1/p' mix.exs | head -n1)"
            PREVIOUS_VERSION="$(git show HEAD^:mix.exs 2>/dev/null | sed -n 's/^  @version "\([^"]*\)"$/\1/p' | head -n1)"

            if [ -z "$VERSION" ]; then
              echo "Failed to read current mix.exs version" >&2
              exit 1
            fi

            TAG="v$VERSION"

            if [ "$VERSION" = "$PREVIOUS_VERSION" ]; then
              SHOULD_RELEASE=false
            else
              SHOULD_RELEASE=true
            fi
          fi

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            TAG_EXISTS=true
          else
            TAG_EXISTS=false
          fi

          # Single source of truth for the NIF version: parse it from the
          # Elixir module that rustler_precompiled compiles against. Keeping
          # it out of `env:` avoids drift if `native.ex` is ever bumped
          # without touching this workflow.
          NIF_VERSION="$(sed -n 's/^[[:space:]]*nif_versions:[[:space:]]*\["\([^"]*\)"\].*$/\1/p' \
            lib/whisper_ct2/native.ex | head -n1)"
          if [ -z "$NIF_VERSION" ]; then
            echo "Failed to parse nif_versions from lib/whisper_ct2/native.ex" >&2
            exit 1
          fi

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"
          echo "sha=$TRIGGER_SHA" >> "$GITHUB_OUTPUT"
          echo "nif_version=$NIF_VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    name: ${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 Linux: default oneDNN backend, CUDA loaded lazily
          - id: x86_64-unknown-linux-gnu
            suffix: ""
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            lib_ext: so
            features: dnnl cuda-dynamic
            install_cuda: true

          # x86_64 Linux: Intel-tuned MKL variant
          - id: x86_64-unknown-linux-gnu--mkl
            suffix: "--mkl"
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            lib_ext: so
            features: mkl cuda-dynamic
            install_cuda: true

          # x86_64 Linux: AMD ROCm/HIP variant. Mutually exclusive with the
          # CUDA backend (CTranslate2's HIP CMake arm fatal-errors on
          # WITH_CUDA=ON). ROCm has no equivalent to `cuda-dynamic`, so
          # the resulting binary only runs on hosts with the ROCm runtime
          # installed (libamdhip64, libhipblas).
          - id: x86_64-unknown-linux-gnu--rocm
            suffix: "--rocm"
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            lib_ext: so
            features: hip dnnl
            install_cuda: false
            install_rocm: true

          # aarch64 Linux: Graviton/Grace, oneDNN, optional CUDA via dynamic loading
          - id: aarch64-unknown-linux-gnu
            suffix: ""
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            lib_ext: so
            features: dnnl cuda-dynamic
            install_cuda: true

          # Apple Silicon: Accelerate framework, no CUDA
          # cargo emits .dylib on macOS; rustler_precompiled requests .so
          # for darwin targets (matches Explorer, Tokenizers convention).
          - id: aarch64-apple-darwin
            suffix: ""
            target: aarch64-apple-darwin
            runner: macos-15
            src_ext: dylib
            lib_ext: so
            features: accelerate
            install_cuda: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Pin to the SHA detect inspected so artefacts match the version
          # detect resolved, even if `main` moves while the matrix is running.
          ref: ${{ needs.detect.outputs.sha }}

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      # --- Linux build dependencies ---

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake perl libclang-dev pkg-config

      - name: Install CUDA toolkit
        if: matrix.install_cuda
        env:
          ARCH: ${{ runner.arch == 'X64' && 'x86_64' || 'sbsa' }}
        run: |
          # CUDA dynamic-loading still needs the SDK at *build* time to
          # compile the .cu kernels; libcudart is loaded lazily at run time.
          DISTRO=ubuntu2404
          KEYRING=cuda-keyring_1.1-1_all.deb
          wget -q "https://developer.download.nvidia.com/compute/cuda/repos/${DISTRO}/${ARCH}/${KEYRING}"
          sudo dpkg -i "${KEYRING}"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cuda-toolkit-12-6
          echo "PATH=/usr/local/cuda/bin:$PATH" >> "$GITHUB_ENV"

      - name: Install ROCm SDK
        if: matrix.install_rocm
        run: |
          # ROCm SDK is required at *build* time to compile the .hip kernels.
          # We install only the development packages; the runtime libraries
          # (libamdhip64, libhipblas) must be present on the consumer's
          # machine — there is no equivalent to CUDA dynamic-loading.
          sudo install -d -m 0755 /etc/apt/keyrings
          wget -qO- https://repo.radeon.com/rocm/rocm.gpg.key | \
            sudo gpg --dearmor -o /etc/apt/keyrings/rocm.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] \
            https://repo.radeon.com/rocm/apt/6.2.4 noble main" | \
            sudo tee /etc/apt/sources.list.d/rocm.list
          # Ubuntu 24.04 ships rocminfo / rocm-cmake / hipcc 5.7.x that
          # apt prefers over the AMD repo's 6.2.4 versions; pin the AMD
          # repo above the Ubuntu archive so the SDK install resolves.
          sudo tee /etc/apt/preferences.d/rocm-pin-600 >/dev/null <<'PIN'
          Package: *
          Pin: origin repo.radeon.com
          Pin-Priority: 600
          PIN
          sudo apt-get update
          # Install only the components CTranslate2's HIP build needs:
          # - hipcc                          HIP compiler driver (wraps clang++)
          # - rocm-device-libs               GPU bitcode the HIP compiler links
          #                                  against; without it `clang++` errors
          #                                  with "cannot find ROCm device library"
          # - hipblas-dev, hiprand-dev,      linkable libs + headers
          #   hipcub-dev, rocprim-dev,
          #   rocthrust-dev
          # Skip rocm-hip-sdk meta-package — it pulls rocminfo and other
          # runtime tooling we don't need at build time.
          sudo apt-get install -y --no-install-recommends \
            hipcc rocm-device-libs \
            hipblas-dev hiprand-dev hipcub-dev rocprim-dev rocthrust-dev
          echo "PATH=/opt/rocm/bin:$PATH" >> "$GITHUB_ENV"
          echo "ROCM_PATH=/opt/rocm" >> "$GITHUB_ENV"
          # Default GFX targets. Mirrors AMD's "common" deploy set:
          # gfx906 (Vega20/MI50), gfx908 (MI100), gfx90a (MI200/MI210/MI250),
          # gfx942 (MI300), gfx1030 (RDNA2 / RX 6000), gfx1100 (RDNA3 / RX 7900).
          echo "CMAKE_HIP_ARCHITECTURES=gfx906;gfx908;gfx90a;gfx942;gfx1030;gfx1100" \
            >> "$GITHUB_ENV"

      # --- Build ---

      - name: Cargo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            native/whisper_ct2_native/target
          key: release-${{ matrix.id }}-${{ hashFiles('native/whisper_ct2_native/Cargo.lock') }}
          restore-keys: release-${{ matrix.id }}-

      - name: Build NIF
        working-directory: native/whisper_ct2_native
        env:
          FEATURES: ${{ matrix.features }}
        run: cargo build --release --target ${{ matrix.target }} --features "$FEATURES"

      # --- Package ---

      - name: Create tarball
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.detect.outputs.version }}
          NIF_VERSION: ${{ needs.detect.outputs.nif_version }}
          SRC_EXT: ${{ matrix.src_ext || matrix.lib_ext }}
          LIB_EXT: ${{ matrix.lib_ext }}
          SUFFIX: ${{ matrix.suffix }}
          BUNDLE_CTRANSLATE2: ${{ matrix.install_rocm && '1' || '0' }}
        run: |
          SRC_DIR="native/whisper_ct2_native/target/${TARGET}/release"
          SRC_NAME="libwhisper_ct2_native.${SRC_EXT}"
          LIB_NAME="libwhisper_ct2_native-v${VERSION}-nif-${NIF_VERSION}-${TARGET}${SUFFIX}.${LIB_EXT}"
          STAGE_DIR="$(mktemp -d)"

          cp "${SRC_DIR}/${SRC_NAME}" "${STAGE_DIR}/${LIB_NAME}"

          if [ "$BUNDLE_CTRANSLATE2" = "1" ]; then
            # CTranslate2's HIP CMake arm produces a SONAME'd shared
            # libctranslate2.so.<major>.<minor>.<patch> plus the
            # libctranslate2.so.<major> and libctranslate2.so symlinks.
            # The NIF's DT_NEEDED records the SONAME (typically the
            # .<major> link), so we must ship the whole symlink chain —
            # not just the real file — for the $ORIGIN rpath lookup to
            # resolve on ROCm hosts.
            CT2_DIR=$(find native/whisper_ct2_native/target -type d \
              -path '*/build' -exec test -e {}/libctranslate2.so \; \
              -print | head -n1)
            if [ -z "$CT2_DIR" ]; then
              echo "libctranslate2.so not found in build output" >&2
              find native/whisper_ct2_native/target -name 'libctranslate2.so*' >&2 || true
              exit 1
            fi
            # `cp -aP` preserves symlinks as symlinks. The glob matches
            # libctranslate2.so, libctranslate2.so.<major>, and
            # libctranslate2.so.<major>.<minor>.<patch>.
            cp -aP "$CT2_DIR"/libctranslate2.so* "${STAGE_DIR}/"
            sudo apt-get install -y --no-install-recommends patchelf
            patchelf --set-rpath '$ORIGIN' "${STAGE_DIR}/${LIB_NAME}"
            echo "--- bundled ROCm artefact contents ---"
            ls -la "${STAGE_DIR}/"
            echo "--- NIF DT_NEEDED ---"
            patchelf --print-needed "${STAGE_DIR}/${LIB_NAME}"
          fi

          tar -czf "${LIB_NAME}.tar.gz" -C "${STAGE_DIR}" .
          rm -rf "${STAGE_DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: nif-${{ matrix.id }}
          path: "*whisper_ct2_native-*.tar.gz"
          if-no-files-found: error

  tag:
    runs-on: ubuntu-24.04
    needs: detect
    if: github.event_name == 'push' && needs.detect.outputs.should_release == 'true' && needs.detect.outputs.tag_exists != 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Same pinning rationale as the release job: tag must point at the
          # commit detect inspected, not whatever `main` looks like by the
          # time this job runs.
          ref: ${{ needs.detect.outputs.sha }}
          fetch-depth: 0

      - name: Create and push release tag
        env:
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "$TAG"
          git push origin "$TAG"

  release:
    name: GitHub Release
    needs:
      - detect
      - build
      - tag
    if: always() && needs.detect.outputs.should_release == 'true' && needs.build.result == 'success' && (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: nif-*
          merge-multiple: true
          path: artifacts/

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: sha256sum *.tar.gz | tee SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          target_commitish: ${{ needs.detect.outputs.sha }}
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
